name: Validate DB and Build Site

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dev dependencies
        run: python3 -m pip install -e '.[dev]'
      - name: Lint and format check
        run: |
          python3 -m ruff format --check scripts app tests
          python3 -m ruff check scripts app tests
      - name: Type check
        run: python3 -m mypy scripts app tests
      - name: Validate database
        run: python3 scripts/validate_db.py
      - name: Build static site
        run: python3 scripts/build_site.py
      - name: Run tests with coverage
        run: python3 -m pytest tests/ -v --cov-fail-under=80
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
